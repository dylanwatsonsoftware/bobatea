<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobatea Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: monospace; padding: 16px; }
        h1 { color: #e0e0ff; margin-bottom: 12px; font-size: 1.5rem; letter-spacing: 2px; }
        #terminal-container { border: 1px solid #444; border-radius: 8px; overflow: hidden; padding: 4px; background: #000; width: 100%; max-width: 900px; }
    </style>
</head>
<body>
    <h1>Bobatea Demo</h1>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>
    <script>
        const fitAddon = new FitAddon.FitAddon();
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: '"Cascadia Code", "Fira Mono", monospace',
            fontSize: 14,
            theme: { background: '#000000', foreground: '#e0e0e0' },
        });
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        window.addEventListener('resize', () => fitAddon.fit());
        window._bobaterm = term;

        // Wire input: buffer keystrokes until Kotlin WASM is ready
        const inputBuffer = [];
        term.onData(data => {
            if (window.web && window.web.pushTerminalInput) {
                while (inputBuffer.length > 0) window.web.pushTerminalInput(inputBuffer.shift());
                window.web.pushTerminalInput(data);
            } else {
                inputBuffer.push(data);
            }
        });
    </script>

    <script src="./bobatea-web.js"></script>
</body>
</html>
